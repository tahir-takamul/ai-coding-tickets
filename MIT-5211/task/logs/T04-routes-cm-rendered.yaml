apiVersion: v1
kind: ConfigMap
metadata:
  name: apisix-routes
  namespace: "apisix-silmarils"
  labels:
    app: apisix
    app.kubernetes.io/name: apisix
    app.kubernetes.io/component: routes
    app.kubernetes.io/part-of: silmarils
data:
  # Single key `apisix.yaml` — matches the subPath mount in
  # apisix-deployment.yaml.j2 which lands this file at
  # /usr/local/apisix/conf/apisix.yaml (APISIX standalone mode source).
  #
  # This is the K8s-flavoured port of silmarils/apisix/apisix.yaml.template:
  #   - cn_whitelist loops over silmarils.apisix.cn_whitelist (CN -> lfi-id)
  #   - dc-tang upstream (id 1) pulls host/port from silmarils.apisix.dc_tang
  #   - forward-auth URI + ssl_verify pull from silmarils.apisix.forward_auth
  #   - jisr / mbridge default upstreams (ids 2, 3) keep the local-dev
  #     simulator targets as fallbacks; org-router.lua overrides them at
  #     request time via X-LFI-ID -> org_routing.json lookup
  #   - ssls[0].cert/.key are direct-Jinja inserted from the materialized
  #     apisix-server-tls Secret (see F05 / T04 lock); no __SSL_*__ placeholders
  apisix.yaml: |
    # APISIX declarative routes for Silmarils ISO API
    # Routes LFI requests to dc-tang (LFI Command Center / Gateway)
    # Rendered by playbooks/15b-apisix-silmarils-lfi.yaml from
    # templates/apisix-routes.yaml.j2 (NOT generated by setup-certs.sh).
    #
    # cert-validator plugin: validates X-Forwarded-Client-Cert header,
    # extracts CN, maps to X-LFI-ID / X-LFI-API-KEY headers.

    # Shared plugin configuration for cert-validator
    # CN whitelist maps client certificate CN -> LFI credentials
    plugin_configs:
      - id: 1
        plugins:
          cert-validator:
            ca_cert_path: "/usr/local/apisix/certs/ca.pem"
            validate_ca: true
            cn_whitelist:
              "system@fab.com":
                lfi_id: "lfi-FAB"
              "system@adcb.com":
                lfi_id: "lfi-ADCB"
              "system@adib.com":
                lfi_id: "lfi-ADIB"

    routes:
      # Route 1 & 2: Request Issuance / Request Redemption
      # Both use the same URI, differentiated by SOAP action in payload
      - id: 1
        uri: /api/v1/issuance-platform
        methods: [POST]
        plugin_config_id: 1
        plugins:
          proxy-rewrite:
            uri: /iso/api/v1/issuance-platform
        upstream_id: 1

      # Route 1a: Same as Route 1 with trailing slash
      - id: 3
        uri: /api/v1/issuance-platform/
        methods: [POST]
        plugin_config_id: 1
        plugins:
          proxy-rewrite:
            uri: /iso/api/v1/issuance-platform
        upstream_id: 1

      # Route 3 & 4: Get Transactions List / Get Transaction Details
      # Both use the same URI with supplementary data in SOAP payload
      - id: 2
        uri: /api/v1/issuance-platform/transactions
        methods: [POST]
        plugin_config_id: 1
        plugins:
          proxy-rewrite:
            uri: /iso/api/v1/issuance-platform
        upstream_id: 1

      # Route 3a: Same as Route 3 with trailing slash
      - id: 4
        uri: /api/v1/issuance-platform/transactions/
        methods: [POST]
        plugin_config_id: 1
        plugins:
          proxy-rewrite:
            uri: /iso/api/v1/issuance-platform
        upstream_id: 1

      # Route 5: Jisr API passthrough — dynamic routing per LFI via org-router
      # org-router reads X-LFI-ID header, resolves upstream host/port/scheme
      # and path_prefix from org_routing.json.
      - id: 5
        uri: /api/commercial
        methods: [POST]
        plugin_config_id: 1
        plugins:
          org-router:
            config_path: /usr/local/apisix/conf/org_routing.json
            header_name: X-LFI-ID
            reject_if_missing: true
          forward-auth:
            uri: "https://dc-tang.silmarils-qa.svc.cluster.local:28888/auth/inbound"
            # GET (not POST) by design: auth decision uses only X-LFI-ID +
            # X-LFI-API-KEY headers. POST would consume the request body and
            # leave the upstream proxy with nothing to forward.
            request_method: GET
            ssl_verify: true
            request_headers:
              - X-LFI-ID
              - X-LFI-API-KEY
        upstream_id: 2

      - id: 6
        uri: /api/commercial/
        methods: [POST]
        plugin_config_id: 1
        plugins:
          org-router:
            config_path: /usr/local/apisix/conf/org_routing.json
            header_name: X-LFI-ID
            reject_if_missing: true
          forward-auth:
            uri: "https://dc-tang.silmarils-qa.svc.cluster.local:28888/auth/inbound"
            request_method: GET
            ssl_verify: true
            request_headers:
              - X-LFI-ID
              - X-LFI-API-KEY
        upstream_id: 2

      # Route 7: mBridge API passthrough — same org-router dynamic routing
      - id: 7
        uri: /api/mbridge
        methods: [POST]
        plugin_config_id: 1
        plugins:
          org-router:
            config_path: /usr/local/apisix/conf/org_routing.json
            header_name: X-LFI-ID
            reject_if_missing: true
          forward-auth:
            uri: "https://dc-tang.silmarils-qa.svc.cluster.local:28888/auth/inbound"
            request_method: GET
            ssl_verify: true
            request_headers:
              - X-LFI-ID
              - X-LFI-API-KEY
        upstream_id: 3

      - id: 8
        uri: /api/mbridge/
        methods: [POST]
        plugin_config_id: 1
        plugins:
          org-router:
            config_path: /usr/local/apisix/conf/org_routing.json
            header_name: X-LFI-ID
            reject_if_missing: true
          forward-auth:
            uri: "https://dc-tang.silmarils-qa.svc.cluster.local:28888/auth/inbound"
            request_method: GET
            ssl_verify: true
            request_headers:
              - X-LFI-ID
              - X-LFI-API-KEY
        upstream_id: 3

    upstreams:
      # ISO API upstream (dc-tang gateway).
      # SIT/UAT/PROD-with-F5-mTLS: add a tls: block with client_cert/client_key
      # if the upstream F5 requires APISIX to present a client cert. Leaving
      # tls: out is correct for the qa case (in-cluster dc-tang on internal CA).
      - id: 1
        type: roundrobin
        scheme: "https"
        nodes:
          "dc-tang.silmarils-qa.svc.cluster.local:28888": 1
        pass_host: node
        timeout:
          connect: 10
          send: 60
          read: 60

      # Jisr API default upstream (overridden dynamically by org-router plugin
      # at request time based on X-LFI-ID -> org_routing.json lookup).
      - id: 2
        type: roundrobin
        scheme: http
        nodes:
          "jisr-simulator:8080": 1
        pass_host: node
        timeout:
          connect: 10
          send: 60
          read: 60

      # mBridge API default upstream (overridden dynamically by org-router).
      - id: 3
        type: roundrobin
        scheme: http
        nodes:
          "mbridge-simulator:8080": 1
        pass_host: node
        timeout:
          connect: 10
          send: 60
          read: 60

    ssls:
      - id: 1
        snis:
          - "localhost"
          - "server"
          - "apisix"
          - "apisix.apisix-silmarils.svc.cluster.local"
          - "apisix.apisix-silmarils.svc"
          - "silmarils-qa-apisix.takamul.cc"
          - "dc-tang"
          - "dc-tanc"
        cert: |
          -----BEGIN CERTIFICATE-----
          STUB_SERVER_CERT_LINE_1
          STUB_SERVER_CERT_LINE_2
          -----END CERTIFICATE-----

        key: |
          -----BEGIN RSA PRIVATE KEY-----
          STUB_SERVER_KEY_LINE_1
          STUB_SERVER_KEY_LINE_2
          -----END RSA PRIVATE KEY-----


    #END
