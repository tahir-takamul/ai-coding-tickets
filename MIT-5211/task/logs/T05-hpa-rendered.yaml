apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: apisix
  namespace: "apisix-silmarils"
  labels:
    app: apisix
    app.kubernetes.io/name: apisix
    app.kubernetes.io/part-of: silmarils
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: apisix
  minReplicas: 2
  maxReplicas: 4
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
  # Sensible defaults: scale up fast on sustained load, scale down slowly
  # to avoid flapping. Requires metrics-server in the cluster (silmarils
  # has it per the monitoring playbook).
  behavior:
    scaleUp:
      stabilizationWindowSeconds: 30
      selectPolicy: Max
      policies:
        - type: Percent
          value: 100
          periodSeconds: 60
        - type: Pods
          value: 4
          periodSeconds: 60
    scaleDown:
      stabilizationWindowSeconds: 300
      selectPolicy: Max
      policies:
        - type: Percent
          value: 50
          periodSeconds: 60
